name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      BASE_URL: https://practicesoftwaretesting.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run API tests
        run: pytest tests/api/ -v --alluredir=allure-results

      # UI tests are non-blocking in CI: the target demo site (practicesoftwaretesting.com)
      # is protected by Cloudflare bot detection, which intermittently blocks headless
      # browser sessions originating from data center IPs (such as GitHub-hosted runners).
      # These same tests pass consistently in local execution. See README for details.
      - name: Run UI tests
        continue-on-error: true
        run: pytest tests/ui/ -v --alluredir=allure-results

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.9
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
        continue-on-error: true